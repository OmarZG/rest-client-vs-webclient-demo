server:
  port: 8082

spring:
  application:
    name: cuenta-corriente-service
  datasource:
    url: jdbc:h2:mem:corrientedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# URLs de servicios externos — sin valores hardcodeados en el código
clients:
  micro-a:
    base-url: http://localhost:8081

logging:
  level:
    org.zgo.cuentacorriente: DEBUG
